  <p>
    Gen Li is an incoming Assistant Professor in the Department of Computer Science at 
    the University of Houston in the fall of 2026. He received his Ph.D. in Electrical and Computer Engineering 
    from Clemson University in 2026. His research focuses on developing efficient and trustworthy 
    machine learning through algorithmic and system-level innovations that make large-scale 
    models more computationally scalable, resilient to real-world challenges, and aligned 
    with ethical principles.
